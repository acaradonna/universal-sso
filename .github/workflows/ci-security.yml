name: CI and Security Scan

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read
  security-events: write
  actions: read
  pull-requests: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package.json

      - name: Web install and build
        working-directory: web
        run: |
          npm ci || npm i
          npm run build

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: api/requirements.txt

      - name: API install and test
        working-directory: api
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m py_compile app.py || true

  trivy-scan:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (API)
        uses: docker/build-push-action@v6
        with:
          context: api
          push: false
          load: true
          tags: api:ci

      - name: Install Trivy (FS scan)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: 'fs'
          scan-ref: .
          format: 'sarif'
          output: 'trivy-code.sarif'
          vuln-type: 'os,library'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy SARIF (FS)
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-code.sarif

      - name: Trivy Image Scan (API)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: api:ci
          format: 'sarif'
          output: 'trivy-api.sarif'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy SARIF (API Image)
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-api.sarif

      - name: Summarize results
        if: always()
        run: |
          echo "## Trivy summary" >> $GITHUB_STEP_SUMMARY
          if [ -f trivy-code.sarif ]; then echo "- Code scan generated SARIF" >> $GITHUB_STEP_SUMMARY; fi
          if [ -f trivy-api.sarif ]; then echo "- API image scan generated SARIF" >> $GITHUB_STEP_SUMMARY; fi
